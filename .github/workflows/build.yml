name: Build N4SH (Manual Select)

on:
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Скомпилировать Android (APK)'
        type: boolean
        default: true
      build_ipa:
        description: 'Скомпилировать iOS (Unsigned IPA для sideloading)'
        type: boolean
        default: false
      build_web:
        description: 'Скомпилировать Web-версию'
        type: boolean
        default: false

jobs:
  build-android:
    if: ${{ inputs.build_apk }}
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Rust
        run: rustup update stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Exact Dummy Keystore
        # Генерируем ключ ровно с теми паролями, которые жестко вшиты
        # в Gradle-скрипт проекта в качестве "запасных" (fallback)
        run: |
          cd android/app
          keytool -genkey -v -keystore dummy.keystore -alias dummyAlias -keyalg RSA -keysize 2048 -validity 10000 -storepass dummyPassword -keypass dummyPassword -dname "CN=Dummy, OU=Dummy, O=Dummy, L=Dummy, S=Dummy, C=US"

      - name: Build Release APK
        # Теперь Gradle спокойно откроет ключ и подпишет APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  build-web:
    if: ${{ inputs.build_web }}
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Rust for Web
        run: |
          rustup update stable
          rustup target add wasm32-unknown-unknown

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Web
        run: bash ./scripts/prepare-web.sh || echo "Script not found, skipping"

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  build-ios:
    if: ${{ inputs.build_ipa }}
    name: Build iOS (Unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Rust for iOS
        run: |
          rustup update stable
          rustup target add aarch64-apple-ios x86_64-apple-ios

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS App (Archive Mode)
        # Собираем ipa вместо ios. Это создаст полноценный .xcarchive
        # в котором гарантированно внедрены все динамические framework'и (включая SQLCipher)
        run: flutter build ipa --release --no-codesign

      - name: Package into Unsigned IPA
        # Заходим в сгенерированный архив, создаем стандартную структуру и пакуем в .ipa
        run: |
          cd build/ios/archive/Runner.xcarchive/Products/Applications
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qry ${{ github.workspace }}/app-unsigned.ipa Payload

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: ${{ github.workspace }}/app-unsigned.ipa
