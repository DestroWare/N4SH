name: Build N4SH (Manual Select)

on:
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Скомпилировать Android (APK)'
        type: boolean
        default: true
      build_ipa:
        description: 'Скомпилировать iOS (Unsigned IPA для sideloading)'
        type: boolean
        default: false
      build_web:
        description: 'Скомпилировать Web-версию'
        type: boolean
        default: false

jobs:
  build-android:
    if: ${{ inputs.build_apk }}
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Rust
        run: rustup update stable

      - name: Install dependencies
        run: flutter pub get

      - name: Disable Release Signing
        # Просто вырезаем требование подписи из конфигурации gradle
        run: sed -i 's/signingConfig signingConfigs.release//g' android/app/build.gradle

      - name: Build Unsigned APK
        # Компилируем чистый релиз без ключей
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-unsigned
          # Используем *.apk, так как файл теперь будет называться app-release-unsigned.apk
          path: build/app/outputs/flutter-apk/*.apk

  build-web:
    if: ${{ inputs.build_web }}
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Rust for Web
        run: |
          rustup update stable
          rustup target add wasm32-unknown-unknown

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Web
        run: bash ./scripts/prepare-web.sh || echo "Script not found, skipping"

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  build-ios:
    if: ${{ inputs.build_ipa }}
    name: Build iOS (Unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Rust for iOS
        run: |
          rustup update stable
          rustup target add aarch64-apple-ios x86_64-apple-ios

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS App (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Package into IPA (with ditto)
        # Заменили zip на нативный архиватор ditto от Apple. 
        # Он гарантированно не сломает структуру фреймворков и библиотек внутри .app
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          ditto -c -k --keepParent Payload app-unsigned.ipa

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: build/ios/iphoneos/app-unsigned.ipa
