name: Build N4SH (Manual Select)

on:
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Скомпилировать Android (APK)'
        type: boolean
        default: true
      build_ipa:
        description: 'Скомпилировать iOS (Unsigned IPA для sideloading)'
        type: boolean
        default: false
      build_web:
        description: 'Скомпилировать Web-версию'
        type: boolean
        default: false

jobs:
  build-android:
    if: ${{ inputs.build_apk }}
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Rust
        run: rustup update stable

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Correct Android Keystore
        # ИСПРАВЛЕНИЕ: key.properties теперь лежит строго в android/
        # а сам сгенерированный ключ - в android/app/
        run: |
          cd android
          keytool -genkey -v -keystore app/release.keystore -alias n4sh_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass fluffypass -keypass fluffypass -dname "CN=N4SH, OU=N4SH, O=N4SH, L=N4SH, S=N4SH, C=US"
          echo "storePassword=fluffypass" > key.properties
          echo "keyPassword=fluffypass" >> key.properties
          echo "keyAlias=n4sh_alias" >> key.properties
          echo "storeFile=release.keystore" >> key.properties

      - name: Build Release APK
        # Теперь Gradle найдет key.properties и использует наш ключ!
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  build-web:
    if: ${{ inputs.build_web }}
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Rust for Web
        run: |
          rustup update stable
          rustup target add wasm32-unknown-unknown

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Web
        run: bash ./scripts/prepare-web.sh || echo "Script not found, skipping"

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  build-ios:
    if: ${{ inputs.build_ipa }}
    name: Build iOS (Unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Rust for iOS
        run: |
          rustup update stable
          rustup target add aarch64-apple-ios x86_64-apple-ios

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS App (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Ad-Hoc Sign Frameworks (Fix SQLCipher)
        # ИСПРАВЛЕНИЕ: Мы принудительно даем всем динамическим фреймворкам псевдо-подпись.
        # Это успокоит загрузчик dyld внутри iOS, и он разрешит запуск SQLCipher.
        run: |
          cd build/ios/iphoneos
          find Runner.app/Frameworks -type d -name "*.framework" -exec codesign --force --sign - --timestamp=none {} +
          codesign --force --sign - --timestamp=none Runner.app

      - name: Package into IPA (with ditto)
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          ditto -c -k --keepParent Payload ${{ github.workspace }}/app-unsigned.ipa

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ github.workspace }}/app-unsigned.ipa
